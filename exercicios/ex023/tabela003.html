<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        table{
            width: 300px;
            border-collapse: collapse;
            text-align: center;
        }
        td{
            padding: 3px;
            border: 1px solid black;
        }
    </style>
    <h1>Mesclagem de celulas</h1>
    <table>
        <tr>
            <td colspan="2">A</td>
            <td>C</td>
            <td rowspan="3">D</td>
        </tr>
        <tr>
            <td rowspan="3">F</td>
            <td>G</td>
            <td>H</td>
        </tr>
        <tr>
            <td colspan="2">K</td>
        </tr>
        <tr>
            <td>O</td>
            <td>P</td>
            <td>Q</td>
        </tr>
    </table>
    
</body>
</html>
