<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de formularios</h1>
    <form action="cad.php" method="get" autocomplete="on">
        <p>
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome" required maxlength="30" placeholder="NOME COMPLETO" autocomplete="name">
        </p>
        <p>
            <label for="imedia">Média</label>
            <input type="number" name="media" id="imedia" placeholder="0 A 10" min="0" max="10" step="0.1" required value="5">
        </p>
        <p> 
            <label for="imes">Período Letivo</label>
            <input type="month" name="mes" id="imes" value="2026-06">
        </p>
        <label for="iday">Dia da Prova</label>
        <input type="date" name="day" id="iday" value="2026-06-11">
        <p>
            <label for="ihora">Horario da Prova</label>
            <input type="time" name="Horario" id="ihora">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
    
</body>
</html>
