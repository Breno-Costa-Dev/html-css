<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elementos</title>
</head>
<body>
    <form action="">
        <p>
            <label for="icor">Cor:</label>
            <input type="color" name="Cor" id="icor" value="#6da858">
        </p>
        <p>
            <input type="range" name="nivel" id="inivel" value="10">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        <p>
            <input type="file" name="arq" id="iarq"> <br>
            <label for="iarq">Escolha uma foto para seu perfil</label>
        </p>
    </form>
    
</body>
</html>
