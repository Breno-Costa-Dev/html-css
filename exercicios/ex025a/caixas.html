<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Box</title>
</head>
<body>
    <form action="#">

        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isexm" value="Masculino">
            <label for="isexm">Masculino</label>

            <input type="radio" name="sexo" id="isexf" value="Feminino">
            <label for="isexf">Feminino</label>
            
        </fieldset>

        <fieldset>
            <legend>Esportes Favoritos</legend>
            <input type="checkbox" name="esfut" id="iesfut">
            <label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esbas" id="iesbas">
            <label for="iesbas">Basquete</label> <br>
            <input type="checkbox" name="esnata" id="iesnata">
            <label for="iesnata">Natação</label> <br>
            <input type="checkbox" name="estenis" id="iestenis">
            <label for="iestenis">Tênis</label> <br>
        </fieldset>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
    </form>
    

    
</body>
</html>
