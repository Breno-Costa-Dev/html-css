<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form action="">
        <p>
            <label for="in">Número:</label>
            <input type="range" name="n" id="in" max="10" min="1" value="5" oninput="iv.innerHTML = Number(n.value)">
            <output name="valor" id="iv">5</output>
            </p>
    </form>
    
</body>
</html>
